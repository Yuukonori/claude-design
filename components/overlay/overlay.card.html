<!-- @dsCard group="Components" viewport="700x360" name="Overlay — dialog, toast, tooltip" subtitle="Floating surfaces — the only place shadows appear" -->
<!DOCTYPE html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="../../vendor/react.production.min.js"></script>
<script src="../../vendor/react-dom.production.min.js"></script>
<script src="../../vendor/babel.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="../../vendor/lucide.min.js"></script>
<style>body{margin:0;background:var(--bg-app);padding:24px;font-family:var(--font-sans)}
.row{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.dialogwrap{position:relative;width:300px;height:230px;border:1px dashed var(--border-default);overflow:hidden}
[data-lucide]{width:15px;height:15px}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const { Dialog, Toast, Tooltip, Button, IconButton } = window.LatticeDesignSystem_e801cb;
function StaticDialog(){
  // Render dialog inline (not fixed) for the card preview
  return (
    <div style={{width:300,background:'var(--surface-raised)',border:'1px solid var(--border-default)',boxShadow:'var(--shadow-overlay)'}}>
      <div style={{padding:'20px 20px 12px'}}>
        <div style={{fontFamily:'var(--font-serif-display)',fontSize:22,lineHeight:1.15}}>Delete frame?</div>
        <div style={{fontSize:13,color:'var(--text-secondary)',marginTop:6}}>Its 6 connections will be removed.</div>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',gap:8,padding:'14px 20px',borderTop:'1px solid var(--border-subtle)'}}>
        <Button variant="ghost" size="sm">Cancel</Button>
        <Button variant="danger" size="sm">Delete</Button>
      </div>
    </div>
  );
}
function Demo(){return (<div className="row">
  <StaticDialog/>
  <div style={{display:'flex',flexDirection:'column',gap:12}}>
    <Toast tone="success" title="Code generated" message="Copied to clipboard." onClose={()=>{}}/>
    <Toast tone="danger" title="Export failed" message="Check your connection."/>
    <div style={{display:'flex',gap:10,paddingTop:6}}>
      <Tooltip label="Generate code"><IconButton variant="outline"><i data-lucide="zap"></i></IconButton></Tooltip>
      <Tooltip label="Detach" side="bottom"><IconButton variant="outline"><i data-lucide="unlink"></i></IconButton></Tooltip>
    </div>
  </div>
</div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(()=>window.lucide&&window.lucide.createIcons(),100);
</script>
</body></html>
