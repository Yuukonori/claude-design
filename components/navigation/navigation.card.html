<!DOCTYPE html><html><head><meta charset="utf-8">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>body{margin:0;background:var(--bg-app);padding:24px;font-family:var(--font-sans)}
.panel{margin-top:18px;color:var(--text-secondary);font-size:13px}</style></head>
<body><div id="root"></div>
<script type="text/babel">
const { Tabs } = window.LatticeDesignSystem_e801cb;
function Demo(){
  const [tab,setTab]=React.useState('design');
  return (<div>
    <Tabs value={tab} onChange={setTab} tabs={[
      {value:'design',label:'Design'},
      {value:'code',label:'Code'},
      {value:'rel',label:'Relationships'},
      {value:'history',label:'History'},
    ]}/>
    <div className="panel">Active panel: <span style={{color:'var(--text-primary)',fontWeight:600}}>{tab}</span></div>
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
