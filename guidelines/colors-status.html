<!-- @dsCard group="Colors" viewport="700x150" name="Status hues" subtitle="Muted, desaturated — used only on status, never decoration" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);padding:20px;font-family:var(--font-sans);display:flex;gap:12px}
.cell{flex:1;display:flex;flex-direction:column;gap:8px}
.chip{display:inline-flex;align-items:center;gap:7px;padding:6px 10px;font-size:12px;border:1px solid}
.dot{width:8px;height:8px}
.n{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}</style></head>
<body>
<div class="cell"><div class="chip" style="background:var(--status-success-bg);border-color:var(--green-base);color:var(--green-base)"><span class="dot" style="background:var(--green-base)"></span>Success</div><span class="n">--status-success</span></div>
<div class="cell"><div class="chip" style="background:var(--status-warning-bg);border-color:var(--amber-base);color:var(--amber-base)"><span class="dot" style="background:var(--amber-base)"></span>Warning</div><span class="n">--status-warning</span></div>
<div class="cell"><div class="chip" style="background:var(--status-danger-bg);border-color:var(--red-base);color:var(--red-base)"><span class="dot" style="background:var(--red-base)"></span>Danger</div><span class="n">--status-danger</span></div>
<div class="cell"><div class="chip" style="background:var(--status-info-bg);border-color:var(--blue-base);color:var(--blue-base)"><span class="dot" style="background:var(--blue-base)"></span>Info</div><span class="n">--status-info</span></div>
</body></html>
