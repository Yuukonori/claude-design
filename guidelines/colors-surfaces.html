<!-- @dsCard group="Colors" viewport="700x180" name="Surfaces & text" subtitle="How surfaces raise, and the text hierarchy on them" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);padding:20px;font-family:var(--font-sans);display:flex;gap:16px}
.stack{display:flex;flex-direction:column;gap:8px;flex:1}
.surf{border:1px solid var(--border-subtle);padding:14px;display:flex;flex-direction:column;gap:3px}
.n{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
.t1{color:var(--text-primary);font-size:14px}
.t2{color:var(--text-secondary);font-size:14px}
.t3{color:var(--text-muted);font-size:14px}
.t4{color:var(--text-disabled);font-size:14px}</style></head>
<body>
<div class="stack">
  <div class="surf" style="background:var(--bg-app)"><span class="n">--bg-app</span><span class="t1">App background</span></div>
  <div class="surf" style="background:var(--surface)"><span class="n">--surface</span><span class="t1">Surface</span></div>
  <div class="surf" style="background:var(--surface-card)"><span class="n">--surface-card</span><span class="t1">Card</span></div>
  <div class="surf" style="background:var(--surface-hover)"><span class="n">--surface-hover</span><span class="t1">Hover</span></div>
</div>
<div class="stack">
  <div class="surf" style="background:var(--surface-card)">
    <span class="t1">Primary — text-primary</span>
    <span class="t2">Secondary — text-secondary</span>
    <span class="t3">Muted — text-muted</span>
    <span class="t4">Disabled — text-disabled</span>
  </div>
</div>
</body></html>
