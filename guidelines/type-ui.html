<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);padding:24px;font-family:var(--font-sans);color:var(--text-primary)}
.r{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:1px solid var(--border-subtle)}
.r:last-child{border:0}
.n{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:120px;flex:none}</style></head>
<body>
<div class="r"><span class="n">h1 · 28 · 600</span><span style="font-size:28px;font-weight:600;letter-spacing:-0.01em">Heading one</span></div>
<div class="r"><span class="n">h2 · 22 · 600</span><span style="font-size:22px;font-weight:600">Heading two</span></div>
<div class="r"><span class="n">h3 · 18 · 500</span><span style="font-size:18px;font-weight:500">Heading three</span></div>
<div class="r"><span class="n">body · 14 · 400</span><span style="font-size:14px">Body text — the working default at 14px.</span></div>
<div class="r"><span class="n">sm · 13 · 400</span><span style="font-size:13px;color:var(--text-secondary)">Small / secondary</span></div>
</body></html>
