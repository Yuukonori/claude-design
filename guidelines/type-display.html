<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);padding:24px;font-family:var(--font-serif-display);color:var(--text-primary)}

<div class="d2">Design the <i>structure.</i></div>
<div class="row"><span class="s">Display 34 / 44 / 56 / 72</span></div>
