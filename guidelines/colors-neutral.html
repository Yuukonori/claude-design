<!-- @dsCard group="Colors" viewport="700x150" name="Neutral ramp" subtitle="The single ramp the whole brand is built on — 050506 → fafafa" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg-app);padding:20px;font-family:var(--font-sans)}
.row{display:flex;gap:0;border:1px solid var(--border-subtle)}
.sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:6px;font-family:var(--font-mono);font-size:9px;color:var(--text-secondary)}
.lab{font-family:var(--font-mono);font-size:9px;color:var(--text-muted);flex:1;text-align:center;padding-top:6px}
.labs{display:flex}</style></head>
<body>
<div class="row">
  <div class="sw" style="background:var(--neutral-0)">0</div>
  <div class="sw" style="background:var(--neutral-50)">50</div>
  <div class="sw" style="background:var(--neutral-100)">100</div>
  <div class="sw" style="background:var(--neutral-150)">150</div>
  <div class="sw" style="background:var(--neutral-200)">200</div>
  <div class="sw" style="background:var(--neutral-300)">300</div>
  <div class="sw" style="background:var(--neutral-400)">400</div>
  <div class="sw" style="background:var(--neutral-500)">500</div>
  <div class="sw" style="background:var(--neutral-600)">600</div>
  <div class="sw" style="background:var(--neutral-700)">700</div>
  <div class="sw" style="background:var(--neutral-800);color:var(--neutral-0)">800</div>
  <div class="sw" style="background:var(--neutral-900);color:var(--neutral-0)">900</div>
  <div class="sw" style="background:var(--neutral-950);color:var(--neutral-0)">950</div>
</div>
</body></html>
