# Render Blueprint — one-click deploy of the web service + managed Postgres.
# In Render: New → Blueprint → pick this repo. It provisions the DB, wires DATABASE_URL,
# and generates JWT_SECRET automatically. (Free Postgres on Render is time-limited — upgrade
# the `plan` below for anything you want to keep.)
databases:
  - name: lattice-db
    databaseName: lattice
    user: lattice
    plan: free

services:
  - type: web
    name: lattice
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lattice-db
          property: connectionString
      - key: DB_SSL
        value: "true"          # Render Postgres requires TLS
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong random secret
      - key: APP_URL
        value: https://latticeatsha256.onrender.com
      - key: ADMIN_GITHUB_LOGIN
        value: Yuukonori
      # Set these in the Render dashboard from your GitHub OAuth App (kept out of git).
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
