<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lattice — Editor</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>html,body{margin:0;height:100%;background:var(--bg-app)}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Topbar.jsx" data-presets="react"></script>
<script type="text/babel" src="LibraryPanel.jsx" data-presets="react"></script>
<script type="text/babel" src="Canvas.jsx" data-presets="react"></script>
<script type="text/babel" src="Inspector.jsx" data-presets="react"></script>
<script type="text/babel" src="CodePanel.jsx" data-presets="react"></script>
<script type="text/babel" src="RelationshipsView.jsx" data-presets="react"></script>
<script type="text/babel" src="App.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.LatticeApp) return setTimeout(mount, 30);
    ReactDOM.createRoot(document.getElementById('root')).render(<LatticeApp />);
    setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
  };
  mount();
</script>
</body>
</html>
